name: clipboard_monitor
description: Flutter plugin for monitoring system clipboard on Android and iOS.
version: 0.9.3
homepage: https://github.com/mix1009/flutter_clipboard_monitor
repository: https://github.com/mix1009/flutter_clipboard_monitor

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  # This section identifies this Flutter project as a plugin project.
  # The 'pluginClass' and Android 'package' identifiers should not ordinarily
  # be modified. They are used by the tooling to maintain consistency when
  # adding or updating assets for this project.
  plugin:
    platforms:
      android:
        package: com.example.clipboard_monitor
        pluginClass: ClipboardMonitorPlugin
      ios:
        pluginClass: ClipboardMonitorPlugin
